<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="1" stop-color="#102B3F"/>
    </linearGradient>
    <linearGradient id="glow" x1="260" y1="160" x2="1340" y2="740" gradientUnits="userSpaceOnUse">
      <stop stop-color="#63F5B0"/>
      <stop offset="1" stop-color="#61B3FF"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1600" height="900" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="32" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1600" height="900" rx="28" fill="url(#bg)"/>
  <circle cx="1280" cy="120" r="220" fill="#17364E" fill-opacity="0.45"/>
  <circle cx="250" cy="760" r="260" fill="#10304A" fill-opacity="0.35"/>

  <g opacity="0.22">
    <path d="M170 210C360 180 470 300 610 310C760 322 830 208 1010 210C1164 212 1300 280 1440 240" stroke="#8AD9FF" stroke-width="3" stroke-dasharray="10 12"/>
    <path d="M150 670C320 590 510 610 650 550C830 473 982 620 1170 600C1288 587 1364 520 1450 470" stroke="#63F5B0" stroke-width="3" stroke-dasharray="10 12"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="170" y="130" width="1260" height="640" rx="34" fill="#0D1B2A" fill-opacity="0.84" stroke="#234866" stroke-width="2"/>
  </g>

  <rect x="228" y="192" width="330" height="190" rx="24" fill="#102538" stroke="#2D5C80"/>
  <rect x="635" y="192" width="330" height="190" rx="24" fill="#102538" stroke="#2D5C80"/>
  <rect x="1042" y="192" width="330" height="190" rx="24" fill="#102538" stroke="#2D5C80"/>

  <rect x="228" y="485" width="330" height="190" rx="24" fill="#102538" stroke="#2D5C80"/>
  <rect x="635" y="485" width="330" height="190" rx="24" fill="#102538" stroke="#2D5C80"/>
  <rect x="1042" y="485" width="330" height="190" rx="24" fill="#102538" stroke="#2D5C80"/>

  <path d="M800 390L800 485" stroke="url(#glow)" stroke-width="6" stroke-linecap="round"/>
  <path d="M558 287H635" stroke="url(#glow)" stroke-width="6" stroke-linecap="round"/>
  <path d="M965 287H1042" stroke="url(#glow)" stroke-width="6" stroke-linecap="round"/>
  <path d="M558 580H635" stroke="url(#glow)" stroke-width="6" stroke-linecap="round"/>
  <path d="M965 580H1042" stroke="url(#glow)" stroke-width="6" stroke-linecap="round"/>

  <circle cx="800" cy="438" r="76" fill="#0E2234" stroke="url(#glow)" stroke-width="8"/>
  <path d="M800 386L847 407V443C847 475 824 505 800 516C776 505 753 475 753 443V407L800 386Z" fill="url(#glow)"/>

  <text x="270" y="245" fill="#9FD4FF" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Trust Boundaries</text>
  <text x="270" y="282" fill="#D9ECFF" font-family="Inter, Arial, sans-serif" font-size="18">Map where trust changes and</text>
  <text x="270" y="310" fill="#D9ECFF" font-family="Inter, Arial, sans-serif" font-size="18">where input becomes action.</text>

  <text x="677" y="245" fill="#9FD4FF" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">MAESTRO Overlay</text>
  <text x="677" y="282" fill="#D9ECFF" font-family="Inter, Arial, sans-serif" font-size="18">Add the seven-layer view</text>
  <text x="677" y="310" fill="#D9ECFF" font-family="Inter, Arial, sans-serif" font-size="18">without losing real boundaries.</text>

  <text x="1084" y="245" fill="#9FD4FF" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Attack Paths</text>
  <text x="1084" y="282" fill="#D9ECFF" font-family="Inter, Arial, sans-serif" font-size="18">Trace tools, memory, prompts,</text>
  <text x="1084" y="310" fill="#D9ECFF" font-family="Inter, Arial, sans-serif" font-size="18">delegation, and persistence.</text>

  <text x="270" y="538" fill="#9FD4FF" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Evidence Aware</text>
  <text x="270" y="575" fill="#D9ECFF" font-family="Inter, Arial, sans-serif" font-size="18">Separate facts, assumptions,</text>
  <text x="270" y="603" fill="#D9ECFF" font-family="Inter, Arial, sans-serif" font-size="18">and open questions.</text>

  <text x="677" y="538" fill="#9FD4FF" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Mitigations</text>
  <text x="677" y="575" fill="#D9ECFF" font-family="Inter, Arial, sans-serif" font-size="18">Recommend isolation, validation,</text>
  <text x="677" y="603" fill="#D9ECFF" font-family="Inter, Arial, sans-serif" font-size="18">auditability, and recovery.</text>

  <text x="1084" y="538" fill="#9FD4FF" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Actionable Output</text>
  <text x="1084" y="575" fill="#D9ECFF" font-family="Inter, Arial, sans-serif" font-size="18">Produce reports, crosswalks,</text>
  <text x="1084" y="603" fill="#D9ECFF" font-family="Inter, Arial, sans-serif" font-size="18">and issue-ready findings.</text>

  <text x="170" y="90" fill="#F2FAFF" font-family="Space Grotesk, Inter, Arial, sans-serif" font-size="54" font-weight="700">MAESTRO Threat Modeling Skill</text>
  <text x="170" y="840" fill="#B8D5E9" font-family="Inter, Arial, sans-serif" font-size="24">Portable skill for boundary-first threat analysis with an optional MAESTRO seven-layer lens.</text>
</svg>
